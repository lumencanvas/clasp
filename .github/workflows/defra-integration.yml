name: DefraDB Integration Tests

on:
  push:
    paths:
      - 'crates/clasp-identity/**'
      - 'crates/clasp-journal-defra/**'
      - 'crates/clasp-registry-defra/**'
      - 'crates/clasp-defra-bridge/**'
      - 'crates/clasp-config-defra/**'
      - 'crates/clasp-defra-transport/**'
      - 'crates/clasp-state-defra/**'
      - 'tests/defra/**'
      - '.github/workflows/defra-integration.yml'
  pull_request:
    paths:
      - 'crates/clasp-identity/**'
      - 'crates/clasp-journal-defra/**'
      - 'crates/clasp-registry-defra/**'
      - 'crates/clasp-defra-bridge/**'
      - 'crates/clasp-config-defra/**'
      - 'crates/clasp-defra-transport/**'
      - 'crates/clasp-state-defra/**'
      - 'tests/defra/**'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p clasp-identity
      - run: cargo test -p clasp-journal-defra
      - run: cargo test -p clasp-registry-defra
      - run: cargo test -p clasp-defra-bridge
      - run: cargo test -p clasp-config-defra
      - run: cargo test -p clasp-defra-transport
      - run: cargo test -p clasp-state-defra

  integration-tests:
    name: Integration Tests (DefraDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start DefraDB instances
        run: |
          docker network create defra-net
          docker run -d --name defra1 --network defra-net -p 9181:9181 sourcenetwork/defradb:latest start --no-keyring --url 0.0.0.0:9181
          docker run -d --name defra2 --network defra-net -p 9182:9181 sourcenetwork/defradb:latest start --no-keyring --url 0.0.0.0:9181
      - name: Wait for DefraDB to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9181/api/v0/graphql -X POST -H 'Content-Type: application/json' -d '{"query":"{ __typename }"}' >/dev/null 2>&1 && \
               curl -sf http://localhost:9182/api/v0/graphql -X POST -H 'Content-Type: application/json' -d '{"query":"{ __typename }"}' >/dev/null 2>&1; then
              echo "Both DefraDB instances are ready"
              exit 0
            fi
            echo "Waiting for DefraDB... ($i/30)"
            sleep 2
          done
          echo "DefraDB failed to start"
          docker logs defra1
          docker logs defra2
          exit 1
      - name: Verify DefraDB and configure P2P peering
        run: |
          docker ps
          curl -sf http://localhost:9181/api/v0/graphql -X POST -H 'Content-Type: application/json' -d '{"query":"{ __typename }"}' || (echo "defra1 died"; docker logs defra1; exit 1)
          curl -sf http://localhost:9182/api/v0/graphql -X POST -H 'Content-Type: application/json' -d '{"query":"{ __typename }"}' || (echo "defra2 died"; docker logs defra2; exit 1)
          # Peer node 2 with node 1 for P2P sync tests
          PEER1_INFO=$(docker exec defra1 defradb client p2p info --no-keyring 2>/dev/null | grep -o '/ip4/[^"]*') || true
          if [ -n "$PEER1_INFO" ]; then
            # Rewrite IP to use Docker network hostname
            PEER1_ID=$(echo "$PEER1_INFO" | grep -oP '12D3\w+' | head -1)
            docker exec defra2 defradb client p2p add "/dns4/defra1/tcp/9171/p2p/${PEER1_ID}" --no-keyring 2>/dev/null || echo "P2P peering skipped (may not affect non-sync tests)"
          else
            echo "Could not get peer info from defra1, P2P sync tests may fail"
          fi
      - name: Run integration tests
        env:
          DEFRA_URL_1: http://localhost:9181
          DEFRA_URL_2: http://localhost:9182
        run: |
          cargo test -p clasp-journal-defra -- --ignored --test-threads=1
          cargo test -p clasp-registry-defra -- --ignored --test-threads=1
          cargo test -p clasp-config-defra -- --ignored --test-threads=1
          cargo test -p clasp-defra-transport -- --ignored --test-threads=1
          cargo test -p clasp-state-defra -- --ignored --test-threads=1
      - name: Cleanup
        if: always()
        run: |
          docker stop defra1 defra2 2>/dev/null || true
          docker rm defra1 defra2 2>/dev/null || true
          docker network rm defra-net 2>/dev/null || true
