<!DOCTYPE html>
<html>
<head><title>CLASP Relay Compare</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px;white-space:pre-wrap">
<h2>CLASP Relay Compare Test</h2>
<div id="log"></div>
<script src="https://cdn.jsdelivr.net/npm/@clasp-to/core@4.3.1"></script>
<script>
const L = (msg) => { document.getElementById('log').textContent += msg + '\n'; console.log(msg); };

async function testRelay(name, url, authUrl) {
  L('');
  L('=== ' + name + ' ===');
  try {
    let token = null;
    if (authUrl) {
      L('  Getting guest token from ' + authUrl);
      const r = await fetch(authUrl + '/auth/guest', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'test-' + Date.now().toString(36).slice(-4) }),
      });
      if (!r.ok) { L('  AUTH FAILED: ' + r.status + ' ' + await r.text()); return; }
      const auth = await r.json();
      token = auth.token;
      L('  Token: ' + token.slice(0, 15) + '...');
    } else {
      L('  No auth (open relay)');
    }

    L('  Connecting to ' + url);
    const builder = new CLASP.ClaspBuilder(url).withName('test').withReconnect(false);
    if (token) builder.withToken(token);
    const c = await builder.connect();
    L('  Connected! Session: ' + c.session);

    let posts = 0, rooms = 0, total = 0;
    c.on('/social/v1/main/post/**', (v) => { if (v) posts++; });
    c.on('/audiospace/directory/**', (v) => { if (v && !v.__ended) rooms++; });

    // Also try the HTML reference namespace
    c.on('/rly/v1/main/post/**', (v) => { if (v) { posts++; total++; } });

    // Count ALL incoming params
    const origHM = c.handleMessage.bind(c);
    let snapParams = 0, snapCount = 0;
    c.handleMessage = function(msg) {
      if (msg.type === 'SNAPSHOT') {
        snapCount++;
        snapParams += (msg.params || []).length;
        L('  SNAPSHOT #' + snapCount + ': ' + (msg.params || []).length + ' params');
      }
      origHM(msg);
    };

    await new Promise(r => setTimeout(r, 3000));
    L('  ---');
    L('  Snapshots: ' + snapCount + ', total params: ' + snapParams);
    L('  Posts: ' + posts + ', Rooms: ' + rooms);
    c.close();
  } catch (e) {
    L('  ERROR: ' + e.message);
  }
}

(async () => {
  // Test public relay (no auth, what the HTML reference uses)
  await testRelay('PUBLIC relay.clasp.to', 'wss://relay.clasp.to', null);

  // Test demo relay (with auth)
  await testRelay('DEMO demo-relay.clasp.to', 'wss://demo-relay.clasp.to', 'https://demo-relay.clasp.to');

  L('');
  L('DONE');
})();
</script>
</body>
</html>
